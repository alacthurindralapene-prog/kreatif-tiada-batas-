<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreatif Tiada Batas</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: linear-gradient(90deg,#7c3aed,#06b6d4);
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.harga {
  color: #22c55e;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: #7c3aed;
  color: white;
}
</style>
</head>

<body>

<header>
Kreatif Tiada Batas
</header>

<div class="container">
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <p>E-book Website</p>
      <p class="harga">Rp25.000</p>
      <button onclick="beli('E-book Website')">Beli</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <p>Template CV</p>
      <p class="harga">Rp15.000</p>
      <button onclick="beli('Template CV')">Beli</button>
    </div>

  </div>
</div>

<script>
function beli(nama){
  window.open("https://wa.me/6285213494661?text=Halo saya mau beli " + nama);
}
</script>

</body>
</html>
