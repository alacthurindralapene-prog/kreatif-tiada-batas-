<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreatif Tiada Batas</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f1a;
  color: white;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* SEARCH */
.search-box {
  padding: 10px;
}
.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 30px;
  border: none;
  outline: none;
}

/* BANNER */
.banner {
  margin: 10px;
  padding: 20px;
  border-radius: 15px;
  background: linear-gradient(135deg, #ff00cc, #3333ff);
  text-align: center;
  font-size: 16px;
}

/* KATEGORI */
.kategori {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}
.kategori div {
  margin-right: 10px;
  padding: 8px 15px;
  border-radius: 20px;
  background: #1f1f2e;
  cursor: pointer;
  transition: 0.3s;
}
.kategori div:hover {
  background: #6a11cb;
}

/* PRODUK */
.container {
  padding: 10px;
}

.produk-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.produk {
  background: #1a1a2e;
  border-radius: 15px;
  padding: 10px;
  transition: 0.3s;
}

.produk:hover {
  transform: scale(1.03);
}

.produk img {
  width: 100%;
  border-radius: 10px;
}

.nama {
  font-size: 14px;
  margin: 5px 0;
}

.harga {
  color: #00ffd5;
  font-weight: bold;
}

button {
  background: linear-gradient(135deg, #ff00cc, #3333ff);
  color: white;
  border: none;
  padding: 8px;
  width: 100%;
  border-radius: 20px;
  margin-top: 5px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 15px;
  margin-top: 15px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
✨ Kreatif Tiada Batas
</header>

<div class="search-box">
  <input type="text" placeholder="Cari produk kreatif...">
</div>

<div class="banner">
🔥 Produk Digital Premium • Unik • Tidak Pasaran 🔥
</div>

<div class="kategori">
  <div>E-book</div>
  <div>Template</div>
  <div>Cerita Anak</div>
  <div>Belajar</div>
</div>

<div class="container">
  <div class="produk-grid">

    <div class="produk">
      <img src="https://via.placeholder.com/200">
      <div class="nama">E-book Website dari Nol</div>
      <div class="harga">Rp25.000</div>
      <button onclick="beli('E-book Website dari Nol')">Beli</button>
    </div>

    <div class="produk">
      <img src="https://via.placeholder.com/200">
      <div class="nama">Template CV Premium</div>
      <div class="harga">Rp15.000</div>
      <button onclick="beli('Template CV Premium')">Beli</button>
    </div>

    <div class="produk">
      <img src="https://via.placeholder.com/200">
      <div class="nama">Cerita Anak Bergambar</div>
      <div class="harga">Rp10.000</div>
      <button onclick="beli('Cerita Anak Bergambar')">Beli</button>
    </div>

    <div class="produk">
      <img src="https://via.placeholder.com/200">
      <div class="nama">Modul Belajar Sekolah</div>
      <div class="harga">Rp20.000</div>
      <button onclick="beli('Modul Belajar Sekolah')">Beli</button>
    </div>

  </div>
</div>

<footer>
© 2026 Kreatif Tiada Batas • All Rights Reserved
</footer>

<script>
function beli(namaProduk){
  let noWa = "6285213494661";
  let pesan = "Halo, saya mau beli " + namaProduk + " di Kreatif Tiada Batas";
  window.open("https://wa.me/" + noWa + "?text=" + encodeURIComponent(pesan));
}
</script>

</body>
</html>
